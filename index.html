<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>for u</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #050011; font-family: 'Poppins', sans-serif;
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
        }

        /* --- BACKGROUND GALAKSI --- */
        #galaxy-bg {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: radial-gradient(circle at center, #2a0055 0%, #110022 40%, #000000 80%);
            background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2048&auto=format&fit=crop');
            background-size: cover; background-position: center; z-index: 0;
            animation: rotateGalaxy 180s linear infinite;
        }
        @keyframes rotateGalaxy { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }

        #bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(74, 0, 224, 0.4), rgba(0, 0, 0, 0.6)); z-index: 0;
        }

        /* --- KANVAS MATRIX --- */
        #matrix-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; opacity: 0; transition: opacity 1.5s ease-in-out;
            pointer-events: none;
        }

        /* --- KANVAS 3D --- */
        #webgl-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; opacity: 0; transition: opacity 2s ease-in-out; cursor: grab;
        }
        #webgl-container:active { cursor: grabbing; }

        /* --- GAME LAYER PENCARIAN KATA --- */
        #game-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; background: rgba(5, 0, 20, 0.85); backdrop-filter: blur(10px);
            transition: opacity 1.5s ease-in-out; touch-action: none;
        }
        .game-title {
            color: #f8fafc; font-family: 'Dancing Script', cursive; font-size: 2.8rem;
            margin-bottom: 25px; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.5); padding: 0 10px;
        }
        #word-board {
            display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px;
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .cell {
            width: 38px; height: 38px; border-radius: 50%; background: #1e293b; color: #f8fafc;
            display: flex; justify-content: center; align-items: center; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: background 0.1s, transform 0.1s;
        }
        .cell.empty { background: transparent; color: transparent; pointer-events: none; }
        .cell.highlight { background: #3b82f6; transform: scale(1.15); box-shadow: 0 0 15px #3b82f6; }
        .cell.found { background: #ff1493; box-shadow: 0 0 15px #ff1493; } 
        .word-list { display: flex; gap: 15px; margin-top: 35px; flex-wrap: wrap; justify-content: center; }
        .word-pill {
            background: #1e293b; color: #64748b; padding: 12px 25px; border-radius: 30px;
            font-weight: 700; font-size: 1rem; transition: 0.5s all; letter-spacing: 1px;
        }
        .word-pill.found { background: #ff1493; color: white; box-shadow: 0 0 20px rgba(255,20,147,0.7); transform: scale(1.1); }
        .game-hint { color: #94a3b8; font-size: 0.95rem; margin-top: 25px; font-style: italic; }

        @media (max-width: 450px) {
            .cell { width: 32px; height: 32px; font-size: 1rem; }
            #word-board { gap: 5px; padding: 15px; }
            .game-title { font-size: 2.2rem; }
            .word-pill { padding: 10px 18px; font-size: 0.85rem; gap: 10px; }
        }

        /* --- PESAN AKHIR BUNGA DI ATAS --- */
        #final-message {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 5; opacity: 0; pointer-events: none;
            transition: opacity 2s ease-in-out; width: 90%;
            background: rgba(0, 0, 0, 0.6); padding: 15px 10px; border-radius: 20px;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #final-message h2 { 
            color: #fff; font-family: 'Dancing Script', cursive; font-size: 2.1rem; 
            margin: 0; line-height: 1.3; text-shadow: 0 0 15px #ff1493, 0 0 30px #00ffff; 
        }
        #final-message p { color: #ddd; font-size: 0.85rem; margin-top: 8px; margin-bottom: 0; font-weight: 600; }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    
    <!-- ELEMEN AUDIO MUSIK (Siap memutar musik.mp3) -->
    <audio id="bgMusic" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <div id="galaxy-bg"></div>
    <div id="bg-overlay"></div>
    
    <!-- CANVAS UNTUK EFEK MATRIX DAN LED TEKS -->
    <canvas id="matrix-canvas"></canvas>

    <div id="game-layer">
        <h2 class="game-title">Find the magic words first...</h2>
        <div id="word-board"></div>
        <div class="word-list">
            <div class="word-pill" id="pill-YOURE">YOU'RE</div>
            <div class="word-pill" id="pill-VERY">VERY</div>
            <div class="word-pill" id="pill-BEAUTIFUL">BEAUTIFUL</div>
        </div>
        <p class="game-hint">Swipe across letters to connect them!</p>
    </div>

    <div id="webgl-container"></div>
    
    <div id="final-message">
        <h2>Itu benar kamu sangat cantik,<br>ini bunga untukmu 🌸</h2>
        <p>(Geser layar untuk memutar, cubit untuk zoom)</p>
    </div>

    <script>
        let currentStage = 0; 
        let isAudioUnlocked = false;

        // ==========================================
        // FASE 1: LOGIKA GAME PENCARIAN KATA
        // ==========================================
        const gridData = [
            ['','','D','R','','M','X','',''],
            ['','X','L','K','M','G','B','L',''],
            ['B','E','A','U','T','I','F','U','L'], 
            ['E','Z','D','O','K','H','A','P','P'],
            ['M','Y','O','U','R','E','D','E','M'], 
            ['','E','O','K','I','W','Z','J',''],
            ['','','V','E','R','Y','S','',''],     
            ['','','','T','V','Z','','',''],
            ['','','','','U','','','','']
        ];
        
        const targetWords = ["YOURE", "VERY", "BEAUTIFUL"];
        let foundWords = [];
        let isDragging = false;
        let startCell = null;
        let currentLine = [];
        const foundCells = new Set();
        const boardEl = document.getElementById('word-board');

        gridData.forEach((row, r) => {
            row.forEach((letter, c) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (letter === '') cell.classList.add('empty');
                else {
                    cell.textContent = letter;
                    cell.dataset.r = r; cell.dataset.c = c; cell.dataset.letter = letter;
                }
                boardEl.appendChild(cell);
            });
        });

        boardEl.addEventListener('pointerdown', handlePointerDown);
        document.addEventListener('pointermove', handlePointerMove);
        document.addEventListener('pointerup', handlePointerUp);

        function getCellFromEvent(e) {
            let cx = e.clientX, cy = e.clientY;
            if(e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            const el = document.elementFromPoint(cx, cy);
            return el ? el.closest('.cell:not(.empty)') : null;
        }

        function handlePointerDown(e) {
            // Trik untuk memancing izin audio dari browser saat sentuhan pertama
            if(!isAudioUnlocked) {
                const bgMusic = document.getElementById('bgMusic');
                bgMusic.play().then(() => {
                    bgMusic.pause();
                    bgMusic.currentTime = 0;
                    isAudioUnlocked = true;
                }).catch(err => console.log("Audio unlock failed:", err));
            }

            const cell = getCellFromEvent(e);
            if(!cell) return;
            isDragging = true; startCell = cell; currentLine = [cell]; renderHighlights();
        }

        function handlePointerMove(e) {
            if(!isDragging || !startCell) return;
            e.preventDefault(); 
            const cell = getCellFromEvent(e);
            if(!cell) return;
            const r1 = parseInt(startCell.dataset.r), c1 = parseInt(startCell.dataset.c);
            const r2 = parseInt(cell.dataset.r), c2 = parseInt(cell.dataset.c);
            const dr = r2 - r1, dc = c2 - c1;

            if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) {
                currentLine = [];
                const steps = Math.max(Math.abs(dr), Math.abs(dc));
                const stepR = steps === 0 ? 0 : dr / steps;
                const stepC = steps === 0 ? 0 : dc / steps;
                for (let i = 0; i <= steps; i++) {
                    const cEl = document.querySelector(`.cell[data-r="${r1 + stepR * i}"][data-c="${c1 + stepC * i}"]`);
                    if(cEl) currentLine.push(cEl);
                }
                renderHighlights();
            }
        }

        function handlePointerUp(e) {
            if(!isDragging) return;
            isDragging = false;
            const word = currentLine.map(c => c.dataset.letter).join('');
            const revWord = word.split('').reverse().join('');
            let matched = null;
            if(targetWords.includes(word)) matched = word;
            else if(targetWords.includes(revWord)) matched = revWord;

            if(matched && !foundWords.includes(matched)) {
                foundWords.push(matched);
                currentLine.forEach(c => foundCells.add(c));
                document.getElementById(`pill-${matched}`).classList.add('found');
                
                if(foundWords.length === targetWords.length) {
                    setTimeout(() => {
                        document.getElementById('game-layer').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('game-layer').style.display = 'none';
                            startMatrixSequence(); // Memulai Fase 2 (Matrix + Musik)
                        }, 1500);
                    }, 1000);
                }
            }
            currentLine = []; renderHighlights();
        }

        function renderHighlights() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
            currentLine.forEach(c => c.classList.add('highlight'));
            foundCells.forEach(c => c.classList.add('found'));
        }

        // ==========================================
        // FASE 2: EFEK MATRIX DAN LED TEKS
        // ==========================================
        const mCanvas = document.getElementById('matrix-canvas');
        const mCtx = mCanvas.getContext('2d', { willReadFrequently: true });
        let mWidth, mHeight, columns, drops;
        const mChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789♥'.split('');
        const mFontSize = 14;
        let matrixActive = false;
        
        let activeLEDs = []; 
        let currentTextStr = "";

        const neonColors = ['#00ffff', '#ff00ff', '#ffff00', '#00ff00', '#ff1493', '#ffffff'];

        function createLEDText(text) {
            activeLEDs = [];
            currentTextStr = text;
            if(text === "") return;

            const offCanvas = document.createElement('canvas');
            offCanvas.width = mWidth; offCanvas.height = mHeight;
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

            offCtx.fillStyle = '#ffffff';
            offCtx.textAlign = 'center'; 
            offCtx.textBaseline = 'middle';

            const isMobile = mWidth < 600;
            
            if (text === "HEART") {
                offCtx.font = `bold ${isMobile ? 160 : 200}px Arial`; 
                offCtx.fillText('♥', mWidth/2, mHeight/2 - 40);
            } else {
                let size = isMobile ? 80 : 150;
                if(text === "Beautiful") size = isMobile ? 48 : 100; 
                offCtx.font = `bold ${size}px "Space Mono", monospace`;
                offCtx.fillText(text, mWidth/2, mHeight/2);
            }

            const imgData = offCtx.getImageData(0, 0, mWidth, mHeight).data;
            const step = isMobile ? 5 : 7; 

            for (let y = 0; y < mHeight; y += step) {
                for (let x = 0; x < mWidth; x += step) {
                    const idx = (y * mWidth + x) * 4;
                    const alpha = imgData[idx + 3];
                    if (alpha > 128) {
                        let dotColor = '#ffffff';
                        if (text === "HEART") {
                            dotColor = Math.random() > 0.3 ? '#ff1493' : '#ff0000';
                        } else {
                            dotColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                        }
                        activeLEDs.push({x: x, y: y, color: dotColor});
                    }
                }
            }
        }

        function initMatrix() {
            mWidth = window.innerWidth; mHeight = window.innerHeight;
            mCanvas.width = mWidth; mCanvas.height = mHeight;
            columns = mWidth / mFontSize; drops = [];
            for(let x = 0; x < columns; x++) drops[x] = 1;
        }

        function drawMatrix() {
            if(!matrixActive) return;
            
            mCtx.fillStyle = 'rgba(5, 0, 17, 0.15)'; 
            mCtx.fillRect(0, 0, mWidth, mHeight);

            mCtx.fillStyle = '#ff1493'; 
            mCtx.font = mFontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const char = mChars[Math.floor(Math.random() * mChars.length)];
                mCtx.fillText(char, i * mFontSize, drops[i] * mFontSize);
                if(drops[i] * mFontSize > mHeight && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }

            if (activeLEDs.length > 0) {
                const colorGroups = {};
                activeLEDs.forEach(dot => {
                    if(!colorGroups[dot.color]) colorGroups[dot.color] = [];
                    colorGroups[dot.color].push(dot);
                });

                const dotRadius = window.innerWidth < 600 ? 1.8 : 2.5;

                for (let col in colorGroups) {
                    mCtx.fillStyle = col;
                    mCtx.shadowColor = col;
                    mCtx.shadowBlur = window.innerWidth < 600 ? 6 : 10;
                    mCtx.beginPath();
                    colorGroups[col].forEach(dot => {
                        mCtx.moveTo(dot.x, dot.y);
                        mCtx.arc(dot.x, dot.y, dotRadius, 0, Math.PI * 2);
                    });
                    mCtx.fill();
                }
                mCtx.shadowBlur = 0; 

                if (currentTextStr === "HEART") {
                    mCtx.fillStyle = '#ffffff';
                    mCtx.shadowColor = '#00ffff'; 
                    mCtx.shadowBlur = 15;
                    const isMobile = window.innerWidth < 600;
                    mCtx.font = `bold ${isMobile ? 36 : 55}px "Dancing Script", cursive`;
                    mCtx.textAlign = 'center';
                    mCtx.fillText('You Perfect Person', mWidth/2, mHeight/2 + (isMobile ? 70 : 100));
                    mCtx.shadowBlur = 0;
                }
            }

            requestAnimationFrame(drawMatrix);
        }

        function startMatrixSequence() {
            // MENYALAKAN MUSIK TEPAT SAAT FASE 2 DIMULAI
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.play().catch(e => console.log("Musik diblokir", e));

            mCanvas.style.opacity = '1';
            initMatrix(); matrixActive = true; drawMatrix();
            currentStage = 1;

            setTimeout(() => createLEDText("3"), 1000);
            setTimeout(() => createLEDText(""), 1800); 
            setTimeout(() => createLEDText("2"), 2000);
            setTimeout(() => createLEDText(""), 2800);
            setTimeout(() => createLEDText("1"), 3000);
            setTimeout(() => createLEDText(""), 3800);
            
            setTimeout(() => createLEDText("You"), 4000);
            setTimeout(() => createLEDText(""), 4800);
            setTimeout(() => createLEDText("Are"), 5000);
            setTimeout(() => createLEDText(""), 5800);
            setTimeout(() => createLEDText("Beautiful"), 6000);
            setTimeout(() => createLEDText(""), 7000);
            
            setTimeout(() => createLEDText("HEART"), 7500);

            setTimeout(() => {
                mCanvas.style.opacity = '0';
                setTimeout(() => {
                    matrixActive = false; 
                    document.getElementById('webgl-container').style.opacity = '1';
                    currentStage = 2; 
                }, 1500);
            }, 11000);
        }

        // ==========================================
        // FASE 3: SISTEM 3D BUNGA & FOTO (THREE.JS)
        // ==========================================
        const container3D = document.getElementById('webgl-container');
        const scene = new THREE.Scene(); scene.background = null; 
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1500);
        camera.position.set(0, 16, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        container3D.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.target.set(0, 8, 0); 

        scene.add(new THREE.AmbientLight(0xffffff, 1.0)); 
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2); dirLight.position.set(10, 20, 15); scene.add(dirLight);
        const pinkLight = new THREE.PointLight(0xff00ff, 2, 50); pinkLight.position.set(-10, 5, -10); scene.add(pinkLight);

        const starsGeom = new THREE.BufferGeometry();
        const starsPos = new Float32Array(1500 * 3); const starsColors = new Float32Array(1500 * 3);
        for(let i=0; i<1500*3; i+=3) {
            starsPos[i] = (Math.random()-0.5)*300; starsPos[i+1] = (Math.random()-0.5)*300; starsPos[i+2] = (Math.random()-0.5)*300 - 50;
            const col = new THREE.Color().setHSL(Math.random(), 0.8, 0.8); 
            starsColors[i] = col.r; starsColors[i+1] = col.g; starsColors[i+2] = col.b;
        }
        starsGeom.setAttribute('position', new THREE.BufferAttribute(starsPos,3));
        starsGeom.setAttribute('color', new THREE.BufferAttribute(starsColors,3));
        const starField = new THREE.Points(starsGeom, new THREE.PointsMaterial({size: 0.6, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending}));
        scene.add(starField);

        const comet = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), new THREE.MeshBasicMaterial({color: 0xffffff}));
        scene.add(comet);
        const tailGeom = new THREE.BufferGeometry(); const tailPos = new Float32Array(80 * 3);
        tailGeom.setAttribute('position', new THREE.BufferAttribute(tailPos, 3));
        const cometTail = new THREE.Points(tailGeom, new THREE.PointsMaterial({color: 0x00ffff, size: 2.5, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending}));
        scene.add(cometTail); let cometPath = 0;

        const flowerDataList = [];
        const stemMat = new THREE.MeshStandardMaterial({color: 0x32cd32}); 
        const wrapperMat = new THREE.MeshStandardMaterial({color: 0x1a1a1a, roughness: 0.8, side: THREE.DoubleSide});
        const celloMat = new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.25, roughness: 0.1, side: THREE.DoubleSide});
        const ribbonMat = new THREE.MeshStandardMaterial({color: 0xff007f, roughness: 0.4, metalness: 0.2});
        const pearlMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.1, metalness: 0.8});
        const bouquets = []; 

        function buildBouquet(posX, posY, posZ, rotY, targetScale, photoFilename) {
            const bouquetGroup = new THREE.Group(); 
            bouquetGroup.position.set(posX, posY, posZ); bouquetGroup.rotation.y = rotY; bouquetGroup.scale.set(0,0,0); 
            bouquetGroup.userData.targetScale = targetScale;
            scene.add(bouquetGroup); bouquets.push(bouquetGroup);
            
            bouquetGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(5.0, 0.5, 10, 32, 1, true).translate(0, 5, 0), wrapperMat));
            bouquetGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(5.3, 0.6, 10.5, 32, 1, true).translate(0, 5.2, 0), celloMat));
            
            const ribbonGroup = new THREE.Group(); ribbonGroup.position.y = 4.5; 
            const band = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.25, 16, 64), ribbonMat); band.rotation.x = Math.PI / 2; ribbonGroup.add(band);

            const bowFront = new THREE.Group(); bowFront.position.set(0, 0, 2.6); 
            const bowCenter = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), ribbonMat); bowCenter.scale.set(1, 0.8, 0.5); bowFront.add(bowCenter);
            const wingL = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), ribbonMat); wingL.scale.set(1.2, 0.6, 0.2); wingL.position.set(-1.4, 0, -0.2); wingL.rotation.z = Math.PI / 10; bowFront.add(wingL);
            const wingR = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), ribbonMat); wingR.scale.set(1.2, 0.6, 0.2); wingR.position.set(1.4, 0, -0.2); wingR.rotation.z = -Math.PI / 10; bowFront.add(wingR);
            const tailL = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.5, 4, 16), ribbonMat); tailL.scale.set(1, 1, 0.1); tailL.position.set(-0.8, -2, -0.4); tailL.rotation.z = -Math.PI / 8; bowFront.add(tailL);
            const tailR = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.5, 4, 16), ribbonMat); tailR.scale.set(1, 1, 0.1); tailR.position.set(0.8, -2, -0.4); tailR.rotation.z = Math.PI / 8; bowFront.add(tailR);
            ribbonGroup.add(bowFront); bouquetGroup.add(ribbonGroup);

            for(let i=0; i<15; i++) {
                const pearl = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 12), pearlMat);
                const angle = Math.random() * Math.PI * 2, height = 5 + Math.random() * 4; 
                pearl.position.set(Math.cos(angle)*(0.5 + (height/10)*4.5), height, Math.sin(angle)*(0.5 + (height/10)*4.5));
                bouquetGroup.add(pearl);
            }

            function createFlower(x,y,z,rx,rz,colors,delay) {
                const fGrp = new THREE.Group(); fGrp.position.set(x,y,z); fGrp.rotation.set(rx,0,rz);
                const sH = 8 + Math.random()*3; 
                const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,sH,12).translate(0,sH/2,0), stemMat); 
                stem.scale.set(1,0.001,1); fGrp.add(stem);
                
                const hGrp = new THREE.Group(); hGrp.scale.set(0.001,0.001,0.001); fGrp.add(hGrp);
                hGrp.add(new THREE.Mesh(new THREE.SphereGeometry(0.6,12,12).scale(1,0.6,1), new THREE.MeshStandardMaterial({color:0xffcc00})));
                
                const petals = [];
                function addL(c,r,sy,col,oa) {
                    for(let i=0;i<c;i++) {
                        const p = new THREE.Object3D(); p.rotation.y=(i/c)*Math.PI*2; hGrp.add(p);
                        const pt = new THREE.Mesh(new THREE.SphereGeometry(0.5,12,12).translate(0,0.5,0), new THREE.MeshStandardMaterial({color:col, side:THREE.DoubleSide}));
                        pt.scale.set(1.4,sy,0.2); pt.position.z=r; pt.rotation.x=-0.1; pt.userData={tX:oa, sp:0.04}; p.add(pt); petals.push(pt);
                    }
                }
                addL(7,0.2,1.8,colors[0],Math.PI/2.4); addL(10,0.3,2.3,colors[1],Math.PI/1.9); addL(14,0.4,2.8,colors[2],Math.PI/1.5);
                bouquetGroup.add(fGrp); flowerDataList.push({st:stem, sh:sH, hg:hGrp, pt:petals, dl:delay, on:false, type: 'flower'});
            }
            
            const pal = [[0xff007f,0xff69b4,0xffb6c1], [0x7f00ff,0x9370db,0xe6e6fa], [0x00ffff,0x40e0d0,0x7fffd4], [0xffd700,0xffa500,0xff8c00]];
            for(let i=0; i<5; i++) { const a=(i/5)*Math.PI*2; createFlower(Math.cos(a)*1.0, 4.5, Math.sin(a)*1.0, Math.sin(a)*0.15, -Math.cos(a)*0.15, pal[i%4], i*5); }
            for(let i=0; i<10; i++) { const a=(i/10)*Math.PI*2; createFlower(Math.cos(a)*2.5, 3.5, Math.sin(a)*2.5, Math.sin(a)*0.35, -Math.cos(a)*0.35, pal[(i+2)%4], i*5 + 20); }

            const photoStemHeight = 11.5; 
            const photoStem = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, photoStemHeight, 16).translate(0, photoStemHeight/2, 0), stemMat);
            photoStem.position.set(0, 4.5, 0); photoStem.scale.set(1, 0.001, 1); bouquetGroup.add(photoStem);

            const photoHeadGroup = new THREE.Group(); photoHeadGroup.scale.set(0.001, 0.001, 0.001); photoStem.add(photoHeadGroup);
            photoHeadGroup.add(new THREE.Mesh(new THREE.BoxGeometry(4.6, 5.6, 0.2), new THREE.MeshStandardMaterial({color:0xffffff, roughness: 0.8})));
            const photoMesh = new THREE.Mesh(new THREE.PlaneGeometry(4.0, 4.5), new THREE.MeshBasicMaterial({color: 0x111111}));
            photoMesh.position.set(0, 0.3, 0.11); photoHeadGroup.add(photoMesh);

            new THREE.TextureLoader().load(photoFilename, 
                (texture) => { photoMesh.material.map = texture; photoMesh.material.color.setHex(0xffffff); photoMesh.material.needsUpdate = true; },
                undefined,
                (err) => { 
                    new THREE.TextureLoader().load('https://images.unsplash.com/photo-1532012197267-da84d127e765?q=80&w=400&auto=format&fit=crop', (tex) => {
                        photoMesh.material.map = tex; photoMesh.material.color.setHex(0xffffff); photoMesh.material.needsUpdate = true;
                    });
                }
            );
            flowerDataList.push({ st: photoStem, sh: photoStemHeight, hg: photoHeadGroup, dl: 70, on: false, type: 'photo' });
        }

        // Tiga Buket
        buildBouquet(0, -8, 0, 0, 1.0, 'foto1.png');
        buildBouquet(-8, -8, -4, -0.2, 0.8, 'foto2.png');
        buildBouquet(8, -8, -4, 0.2, 0.8, 'foto3.png');

        // Kembang Api
        const fireworks = []; const fwCols = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff, 0xffa500];
        function createFW(x,y,z) {
            const geo = new THREE.BufferGeometry(); const cnt=200; const pos=new Float32Array(cnt*3); const vels=[];
            for(let i=0;i<cnt;i++) { 
                pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z; 
                const sp=0.2+Math.random()*0.4; const th=Math.random()*Math.PI*2; const ph=Math.acos(Math.random()*2-1); 
                vels.push({x:Math.sin(ph)*Math.cos(th)*sp, y:Math.sin(ph)*Math.sin(th)*sp, z:Math.cos(ph)*sp});
            }
            geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
            const pts = new THREE.Points(geo, new THREE.PointsMaterial({size: 0.8, color:fwCols[Math.floor(Math.random()*fwCols.length)], transparent:true, blending:THREE.AdditiveBlending}));
            scene.add(pts); fireworks.push({p:pts, v:vels, l:1.0});
        }

        let bloomTimer = 0; const clock3D = new THREE.Clock();
        
        function animate3D() {
            requestAnimationFrame(animate3D); 
            const t = clock3D.getElapsedTime(); controls.update();
            starField.rotation.y -= 0.0005; starField.rotation.x -= 0.0002;

            cometPath += 0.02;
            comet.position.set(Math.sin(cometPath)*80, Math.cos(cometPath*1.2)*40 + 20, -Math.cos(cometPath)*80 - 40);
            const positions = cometTail.geometry.attributes.position.array;
            for(let i=79; i>0; i--) { positions[i*3]=positions[(i-1)*3]; positions[i*3+1]=positions[(i-1)*3+1]; positions[i*3+2]=positions[(i-1)*3+2]; }
            positions[0]=comet.position.x; positions[1]=comet.position.y; positions[2]=comet.position.z;
            cometTail.geometry.attributes.position.needsUpdate = true;
            
            if(currentStage >= 2) bouquets.forEach(b => { b.rotation.y += 0.002; });

            if(currentStage === 2) { 
                bouquets.forEach(b => { const ts = b.userData.targetScale; b.scale.lerp(new THREE.Vector3(ts, ts, ts), 0.03); });
                if(bouquets[0].scale.y > 0.9) currentStage = 3; 
            }
            
            if(currentStage === 3 || currentStage === 4) {
                bloomTimer++; let allBloomed = true;
                flowerDataList.forEach(d => { 
                    if(bloomTimer > d.dl) d.on=true; 
                    if(d.on) {
                        d.st.scale.y = Math.min(1, d.st.scale.y + 0.04); 
                        if(d.st.scale.y >= 1) {
                            if(d.type === 'flower') {
                                d.hg.position.y = d.sh; d.hg.scale.lerp(new THREE.Vector3(1,1,1), 0.08); 
                                d.pt.forEach(p => { p.rotation.x += (p.userData.tX - p.rotation.x) * p.userData.sp; if(Math.abs(p.userData.tX - p.rotation.x) > 0.1) allBloomed = false; });
                            } else if(d.type === 'photo') {
                                d.hg.position.y = d.sh + 2.5; d.hg.scale.lerp(new THREE.Vector3(1,1,1), 0.05);
                                d.hg.rotation.z = Math.sin(t * 1.5) * 0.05; if(d.hg.scale.x < 0.95) allBloomed = false;
                            }
                        } else { allBloomed = false; }
                    } else { allBloomed = false; }
                });

                if(allBloomed && currentStage === 3) { 
                    currentStage = 4; document.getElementById('final-message').style.opacity = '1';
                    createFW(0, 20, -10); createFW(-20, 25, -20); createFW(20, 30, -15);
                }
            }

            if(currentStage === 4) if(Math.random() < 0.04) createFW((Math.random()-0.5)*100, 15+Math.random()*40, (Math.random()-0.5)*60 - 30);

            for(let i=fireworks.length-1; i>=0; i--){ 
                let fw=fireworks[i]; fw.l-=0.015; 
                if(fw.l<=0){ scene.remove(fw.p); fw.p.geometry.dispose(); fw.p.material.dispose(); fireworks.splice(i,1); continue; }
                fw.p.material.opacity = fw.l; const pos = fw.p.geometry.attributes.position.array;
                for(let j=0; j<fw.v.length; j++){ pos[j*3]+=fw.v[j].x; pos[j*3+1]+=fw.v[j].y; pos[j*3+2]+=fw.v[j].z; fw.v[j].y-=0.005; } 
                fw.p.geometry.attributes.position.needsUpdate = true;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
            if(matrixActive) initMatrix(); 
        });
        
        animate3D();
    </script>
</body>
</html>
